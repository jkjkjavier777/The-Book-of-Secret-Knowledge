<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Quantum Chatbot</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --text: #e6edf3;
    --accent: #7ee787;
    --muted: #8b949e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  header {
    max-width: 560px;
    width: 100%;
    text-align: center;
    margin-bottom: 16px;
  }
  header h1 {
    font-size: 20px;
    margin: 0 0 4px 0;
    letter-spacing: 0.5px;
  }
  header p {
    color: var(--muted);
    font-size: 13px;
    margin: 0;
  }
  main {
    max-width: 560px;
    width: 100%;
    background: var(--panel);
    border: 1px solid #30363d;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    height: 60vh;
  }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg { margin-bottom: 10px; }
  .msg.user { color: var(--text); }
  .msg.bot { color: var(--accent); }
  .msg .tag { color: var(--muted); margin-right: 6px; }
  form {
    display: flex;
    border-top: 1px solid #30363d;
  }
  input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 12px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }
  button {
    background: none;
    border: none;
    color: var(--accent);
    padding: 0 16px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
  }
  button:disabled {
    color: var(--muted);
    cursor: not-allowed;
  }
  footer {
    max-width: 560px;
    width: 100%;
    text-align: center;
    margin-top: 12px;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div style="display:flex; flex-direction:column; align-items:center; width:100%;">
    <header>
      <h1>&gt; quantum_chatbot</h1>
      <p>powered by Mistral AI</p>
    </header>
    <main>
      <div id="log"></div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Ask me anything..." autocomplete="off" />
        <button type="submit" id="send-btn">send</button>
      </form>
    </main>
    <footer>Chatbot powered by Mistral AI and LeChat</footer>
  </div>

<script>
  const log = document.getElementById('log');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');

  // Replace with your actual Mistral API key
  const MISTRAL_API_KEY = 'Ch3avagfUdrcIU5kgeJDjhGAYua7SPje';

  function addMsg(text, cls, tag) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.innerHTML = '<span class="tag">' + tag + '</span>' + text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  async function sendMessage(userText) {
    addMsg(userText, 'user', '&gt;');
    sendBtn.disabled = true;
    input.disabled = true;

    try {
      const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${MISTRAL_API_KEY}`
        },
        body: JSON.stringify({
          model: 'mistral-small-latest',
          messages: [{ role: 'user', content: userText }]
        })
      });

      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }

      const data = await response.json();
      const botReply = data.choices[0].message.content;
      addMsg(botReply, 'bot', 'ψ');
    } catch (error) {
      addMsg(`Error: ${error.message}`, 'bot', '⚠');
    } finally {
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    sendMessage(text);
  });
</script>
</body>
</html>
