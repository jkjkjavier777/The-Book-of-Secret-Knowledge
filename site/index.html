<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Knowledge Chatbot</title>
  <style>
    :root{--bg:#0b1020;--panel:#121a33;--line:#263255;--text:#e8ecff;--muted:#9aa7d6;--accent:#7c5cff;--user:#2b7cff;--bot:#1c2647}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(160deg,#050816,#0b1020 40%,#151b31);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px}
    .app{width:min(920px,100%);display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    .card{background:rgba(18,26,51,.92);border:1px solid var(--line);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden}
    .hero{padding:28px}
    h1{margin:0 0 12px;font-size:clamp(30px,4vw,52px)}
    p{line-height:1.5;color:var(--muted)}
    .chip{display:inline-block;padding:8px 12px;border:1px solid var(--line);border-radius:999px;color:var(--text);margin-top:10px;background:rgba(255,255,255,.03)}
    .chat{display:flex;flex-direction:column;height:720px}
    .top{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .status{color:#90ffa8;font-size:14px}
    .msgs{padding:18px;gap:12px;display:flex;flex-direction:column;overflow:auto;flex:1}
    .msg{max-width:85%;padding:12px 14px;border-radius:16px;white-space:pre-wrap;word-wrap:break-word}
    .bot{background:var(--bot);border:1px solid var(--line);align-self:flex-start}
    .user{background:linear-gradient(135deg,var(--user),#6b5cff);align-self:flex-end}
    .composer{display:flex;gap:10px;padding:16px;border-top:1px solid var(--line)}
    textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:14px;background:#0c1328;color:var(--text);padding:12px 14px;min-height:52px;outline:none}
    button{border:0;border-radius:14px;background:var(--accent);color:white;padding:0 18px;font-weight:700;cursor:pointer}
    button:hover{filter:brightness(1.08)}
    .small{font-size:13px;color:var(--muted);margin-top:12px}
    a{color:#bda8ff}
    @media (max-width: 840px){.app{grid-template-columns:1fr}.chat{height:680px}}
  </style>
</head>
<body>
  <div class="app">
    <section class="card hero">
      <div class="chip">GitHub req
